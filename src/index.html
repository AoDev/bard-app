<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="canonical" href="<%= webDomain %>" />
    <meta http-equiv="Content-Security-Policy" content="<%= contentPolicy %>" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title><%= appTitle %></title>
    <!-- Search Engine -->
    <meta name="description" content="<%= fullDescription %>" />
    <meta name="image" content="<%= previewImage %>" />
    <!-- Schema.org for Google -->
    <meta itemprop="name" content="<%= appTitle %>" />
    <meta itemprop="description" content="<%= fullDescription %>" />
    <meta itemprop="image" content="<%= previewImage %>" />
    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="<%= appTitle %>" />
    <meta name="twitter:description" content="<%= fullDescription %>" />
    <meta name="twitter:image:src" content="<%= previewImage %>" />
    <!-- Open Graph general (Facebook, Pinterest & Google+) -->
    <meta name="og:title" content="<%= appTitle %>" />
    <meta name="og:description" content="<%= fullDescription %>" />
    <meta name="og:image" content="<%= previewImage %>" />
    <meta name="og:type" content="website" />

    <style>
      .splash-screen {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial,
          sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol';
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        right: 0;
        display: flex;
        justify-content: center;
        background-color: #fff;
      }

      .splash-screen__content {
        display: flex;
        flex-direction: column;
        align-content: center;
        justify-content: center;
      }

      .splash__title {
        margin-top: 0;
        margin-bottom: 0;
        text-align: center;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }

        to {
          opacity: 1;
        }
      }

      .fadeIn {
        animation-name: fadeIn;
        animation-duration: 1s;
        animation-fill-mode: both;
      }

      .splash__logo {
        position: relative;
        top: -48px;
      }

      .splash__subtitle {
        font-size: 1em;
        text-align: center;
        text-transform: capitalize;
        letter-spacing: 0.05em;
      }
    </style>
  </head>

  <body>
    <div id="root" class="height-100p">
      <div class="splash-screen">
        <div class="splash-screen__content">
          <h1 class="splash__title">
            <img
              class="splash__logo fadeIn"
              src="<%= publicPath %>images/app-logo.svg"
              height="96"
              alt="<%= appTitle %>"
            />
          </h1>
        </div>
      </div>
    </div>
  </body>
</html>
